<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f1f5f9" id="mtc">
<title>MOVE.BIN</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════
   COTIZA-STYLE THEME TOKENS
   ═══════════════════════════════ */
[data-theme="dark"]{
  --bg:#0f172a;--bg2:#1e293b;--sf:#1e293b;--sf2:#334155;
  --bd:#334155;--bdh:#475569;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b;
  --ac:#3b82f6;--acd:rgba(59,130,246,.12);--acb:rgba(59,130,246,.25);--act:#fff;
  --em:#10b981;--emd:rgba(16,185,129,.1);--emb:rgba(16,185,129,.2);
  --red:#ef4444;--redb:rgba(239,68,68,.08);
  --ylw:#f59e0b;--ylwb:rgba(245,158,11,.08);
  --org:#f97316;--blu:#60a5fa;--pnk:#f472b6;--prp:#a78bfa;
  --hdr:#1e293b;--hdr-border:#334155;
  --card:#1e293b;--card-border:#334155;
  --shd:0 4px 24px rgba(0,0,0,.3);
}
[data-theme="light"]{
  --bg:#f1f5f9;--bg2:#e2e8f0;--sf:#ffffff;--sf2:#f8fafc;
  --bd:#e2e8f0;--bdh:#cbd5e1;
  --t1:#0f172a;--t2:#64748b;--t3:#94a3b8;
  --ac:#2563eb;--acd:rgba(37,99,235,.08);--acb:rgba(37,99,235,.18);--act:#fff;
  --em:#059669;--emd:rgba(5,150,105,.06);--emb:rgba(5,150,105,.15);
  --red:#dc2626;--redb:rgba(220,38,38,.06);
  --ylw:#d97706;--ylwb:rgba(217,119,6,.06);
  --org:#ea580c;--blu:#2563eb;--pnk:#db2777;--prp:#7c3aed;
  --hdr:#ffffff;--hdr-border:#e2e8f0;
  --card:#ffffff;--card-border:#e2e8f0;
  --shd:0 1px 8px rgba(0,0,0,.05);
}

/* ═══════════════════════════════
   BASE
   ═══════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdh);border-radius:6px}
.lc{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle}
.lc svg{width:1em;height:1em;stroke-width:2.2}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;box-shadow:var(--shd);transition:all .2s}
.card:hover{border-color:var(--bdh)}
.card-sm{border-radius:12px}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes ringDraw{from{stroke-dashoffset:251}to{stroke-dashoffset:var(--o)}}
.an{animation:rise .4s cubic-bezier(.22,1,.36,1) both}
.d1{animation-delay:.04s}.d2{animation-delay:.08s}.d3{animation-delay:.12s}
.d4{animation-delay:.16s}.d5{animation-delay:.2s}.d6{animation-delay:.24s}
.hdr{background:var(--hdr);border-bottom:1px solid var(--hdr-border);position:sticky;top:0;z-index:100}
.hdr-accent{height:4px;background:linear-gradient(90deg,#ef4444,#f97316,#3b82f6)}
.hdr-inner{padding:12px 16px 10px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#3b82f6,#2563eb);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.logo-icon svg{width:20px;height:20px}
.logo-text{font-weight:800;font-size:16px;color:var(--t1);letter-spacing:-.3px}
.logo-text span{color:var(--ac)}
.logo-sub{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.hdr-r{display:flex;gap:6px;align-items:center}
.sb{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:9px;padding:4px 10px;border-radius:20px;border:1px solid;font-weight:700}
.sb.local{color:var(--t3);border-color:var(--bd)}.sb.syncing{color:var(--ac);border-color:var(--ac);background:var(--acd)}
.sb.synced{color:var(--em);border-color:var(--em);background:var(--emd)}.sb.error{color:var(--red);border-color:var(--red)}
.sd{width:5px;height:5px;border-radius:50%;background:currentColor}
.sp{animation:spin .7s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}
.ib{width:34px;height:34px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;color:var(--t2);position:relative}
.ib:hover{border-color:var(--ac);color:var(--ac);background:var(--acd);transform:scale(1.05)}.ib:active{transform:scale(.95)}
.ib[data-t]:hover::after{content:attr(data-t);position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--sf);color:var(--t1);font-size:9px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;z-index:200;border:1px solid var(--bd)}
.tabs{display:flex;gap:3px;background:var(--sf2);border-radius:12px;padding:3px}
.tab{flex:1;padding:8px 4px;background:transparent;color:var(--t3);border:none;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px}
.tab svg{width:14px;height:14px}
.tab.on{background:var(--ac);color:var(--act);font-weight:700;box-shadow:0 2px 8px rgba(59,130,246,.25)}
.cnt{padding:14px 16px 100px;position:relative;z-index:1;max-width:768px;margin:0 auto}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;transition:all .15s;border:none;line-height:1}
.btn-p{background:var(--ac);color:var(--act);border-radius:12px;box-shadow:0 2px 8px rgba(59,130,246,.2);padding:10px 18px;font-size:13px}
.btn-p:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-em{background:var(--em);color:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(16,185,129,.2);padding:10px 18px;font-size:13px}
.btn-em:hover{filter:brightness(1.1)}
.btn-g{background:transparent;border:1px solid var(--bd);color:var(--t2);border-radius:10px;padding:6px 12px;font-size:11px;font-weight:600}
.btn-g:hover{border-color:var(--ac);color:var(--ac)}
.btn-d{background:var(--redb);border:1px solid rgba(239,68,68,.2);color:var(--red);border-radius:10px;padding:8px 14px;font-size:11px;font-weight:700}
.btn-d:hover{background:rgba(239,68,68,.15)}
.btn-sm{padding:5px 10px;font-size:10px;border-radius:8px}
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.hc{padding:16px 10px;text-align:center;background:var(--card);border:1px solid var(--card-border);border-radius:16px}
.hc.tap{cursor:pointer;transition:all .15s}.hc.tap:hover{transform:translateY(-2px);border-color:var(--ac)}
.hn{font-size:32px;font-weight:900;letter-spacing:-2px;line-height:1}
.hl{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-top:6px}
.hh{font-size:7px;color:var(--t3);margin-top:3px;text-transform:uppercase}
.status-row{display:flex;gap:6px;margin-bottom:14px}
.status-chip{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px;border-radius:12px;background:var(--card);border:1px solid var(--card-border)}
.st-dot{display:block;width:7px;height:7px;min-width:7px;border-radius:50%;flex-shrink:0}
.st-dot.empty{background:var(--t3)}.st-dot.started{background:var(--ylw)}.st-dot.packed{background:var(--em)}
.st-num{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800}
.st-label{font-size:9px;color:var(--t2);font-weight:600}
.ring-row{padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:16px}
.ring-svg{width:70px;height:70px;flex-shrink:0;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:var(--bd);stroke-width:5}
.ring-fill{fill:none;stroke:var(--em);stroke-width:5;stroke-linecap:round;stroke-dasharray:251;animation:ringDraw .8s cubic-bezier(.22,1,.36,1) both;animation-delay:.2s}
.ring-pct{font-size:18px;font-weight:900;fill:var(--t1);dominant-baseline:central;text-anchor:middle;transform:rotate(90deg);transform-origin:center}
.ring-info{flex:1}.ring-t{font-size:14px;font-weight:700;margin-bottom:2px}.ring-s{font-size:12px;color:var(--t2);line-height:1.5}
.sec-h{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.zone{padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .12s}
.zone:hover{transform:translateY(-1px)}
.zone-n{font-size:14px;font-weight:700}.zone-s{font-size:10px;color:var(--t2);margin-top:2px}
.zone-items{font-size:10px;color:var(--t2);margin-top:4px;line-height:1.5}.zone-items b{color:var(--t1);font-weight:600}
.zone-b{background:var(--emd);border:1px solid var(--emb);padding:4px 12px;border-radius:20px;font-size:11px;color:var(--em);font-family:'JetBrains Mono',monospace;font-weight:700}
.imp-item{display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:4px;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s}
.imp-item:hover{background:var(--ylwb)}
.imp-bin{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t2);font-weight:700;margin-left:auto}
.filters{overflow-x:auto;white-space:nowrap;display:flex;gap:4px;margin-bottom:12px;padding-bottom:4px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;background:var(--sf2);color:var(--t2);border:1px solid var(--bd);border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0}
.pill.on{background:var(--ac);color:var(--act);border-color:var(--ac);font-weight:700;box-shadow:0 2px 8px rgba(59,130,246,.2)}
.pill .pc{font-size:9px;font-weight:700;opacity:.7}
.sort-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sort-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.sort-sel{background:var(--sf2);border:1px solid var(--bd);border-radius:10px;padding:6px 28px 6px 10px;color:var(--t1);font-size:11px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l3 3 3-3' stroke='%2394A3B8' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center}
.bc{padding:14px 16px;margin-bottom:8px;cursor:pointer;border-left:3px solid var(--ac);transition:all .12s}
.bc:active{transform:scale(.985)}
.bc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.bc-info{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.bc-icon{width:40px;height:40px;min-width:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bc-meta{min-width:0;flex:1}
.bc-id{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.bc-label{font-size:14px;font-weight:700;margin-top:1px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bc-zone{font-size:10px;color:var(--t2);font-weight:500;display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-top:2px}
.bc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.bc-count{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:800;font-family:'JetBrains Mono',monospace}
.bc-st{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;display:inline-flex;align-items:center;gap:4px}
.bc-st.empty{color:var(--t3)}.bc-st.started{color:var(--ylw)}.bc-st.packed{color:var(--em)}
.bc-loc{font-size:10px;color:var(--t2);margin-top:8px;font-weight:500;display:flex;align-items:center;gap:4px}
.bc-chips{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px}
.bc-chip{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:3px 8px;font-size:10px;font-weight:500;color:var(--t1)}
.bc-chip.imp{border-color:rgba(245,158,11,.3);color:var(--ylw)}
.bc-chip.has-ch{border-color:var(--acb);color:var(--ac)}
.bc-chip.more{color:var(--t3);font-style:italic;border:none;background:transparent;padding:2px 4px}
.bc-flags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.flag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.3px}
.flag-fragile{background:rgba(239,68,68,.08);color:var(--red);border:1px solid rgba(239,68,68,.15)}
.flag-size{background:var(--sf2);color:var(--t2);border:1px solid var(--bd)}
.flag-notes{background:var(--acd);color:var(--ac);border:1px solid var(--acb)}
.flag svg{width:11px;height:11px}
.bc-prog{margin-top:8px;display:flex;align-items:center;gap:8px}
.bc-prog-bar{flex:1;height:4px;background:var(--sf2);border-radius:4px;overflow:hidden}
.bc-prog-fill{height:100%;background:var(--em);border-radius:4px;transition:width .3s}
.bc-prog-lbl{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--em);font-weight:700;min-width:28px;text-align:right}
.add-btn{width:100%;padding:16px;background:transparent;border:2px dashed var(--bd);border-radius:16px;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn:hover{border-color:var(--ac);color:var(--ac)}
.add-btn svg{width:16px;height:16px}
.back{background:transparent;border:none;color:var(--ac);font-size:13px;cursor:pointer;padding:0;margin-bottom:14px;font-weight:700;display:flex;align-items:center;gap:4px;transition:color .12s}
.back:hover{color:var(--blu)}
.back svg{width:16px;height:16px}
.det{padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.det-top{display:flex;justify-content:space-between;align-items:flex-start}
.det-icon{font-size:44px;margin-bottom:10px}
.det-id{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:700;display:flex;align-items:center;gap:6px}
.det-label{font-size:22px;font-weight:900;margin-top:2px;letter-spacing:-.5px}
.det-zone{font-size:12px;color:var(--t2);margin-top:2px}
.det-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.nfc-tag{margin-top:14px;background:var(--acd);border:1px solid var(--acb);border-radius:12px;padding:10px 14px;font-size:11px;color:var(--ac);font-family:'JetBrains Mono',monospace;font-weight:700;display:flex;align-items:center;gap:8px}
.nfc-tag svg{width:16px;height:16px;flex-shrink:0}
.sts{display:flex;gap:6px;margin-top:12px}
.sts-o{padding:8px 16px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);color:var(--t2);transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.sts-o:hover{border-color:var(--t2)}
.sts-o.on.s-empty{border-color:var(--t3);color:var(--t3);background:rgba(100,116,139,.08)}
.sts-o.on.s-started{border-color:var(--ylw);color:var(--ylw);background:var(--ylwb)}
.sts-o.on.s-packed{border-color:var(--em);color:var(--em);background:var(--emd)}
.det-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.det-field{display:flex;flex-direction:column;gap:4px}
.det-field label{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:flex;align-items:center;gap:4px}
.det-field label svg{width:12px;height:12px}
.inp{flex:1;padding:12px 16px;background:var(--sf2);border:1px solid var(--bd);border-radius:12px;color:var(--t1);font-size:14px;font-family:'Inter',sans-serif;font-weight:500;outline:none;transition:border-color .15s}.inp:focus{border-color:var(--ac)}.inp::placeholder{color:var(--t3)}
.inp-sm{padding:8px 12px;font-size:12px;border-radius:10px}
.sel-sm{padding:8px 12px;font-size:12px;border-radius:10px;background:var(--sf2);border:1px solid var(--bd);color:var(--t1);font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none;cursor:pointer}
.sel-sm:focus{border-color:var(--ac)}
.tog{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:var(--sf2);border:1px solid var(--bd);cursor:pointer;transition:all .12s;font-size:12px;font-weight:600;color:var(--t2)}
.tog.on{border-color:var(--red);color:var(--red);background:var(--redb)}
.tog svg{width:16px;height:16px}
.notes-area{width:100%;padding:10px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:10px;color:var(--t1);font-size:12px;font-family:'Inter',sans-serif;outline:none;resize:vertical;min-height:60px;transition:border-color .15s}
.notes-area:focus{border-color:var(--ac)}
.add-row{display:flex;gap:6px;margin-bottom:14px}
.btn-star{padding:12px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:12px;font-size:16px;cursor:pointer;transition:all .12s;line-height:1;display:flex;align-items:center;justify-content:center}
.btn-star.on{border-color:var(--ylw);background:var(--ylwb);color:var(--ylw)}
.btn-star svg{width:18px;height:18px}
.btn-plus{padding:12px 22px;border-radius:12px;font-weight:900;font-size:18px;cursor:pointer;line-height:1;background:var(--ac);color:var(--act);border:none;display:flex;align-items:center;justify-content:center}
.btn-plus svg{width:20px;height:20px}
.ic{font-size:11px;color:var(--t2);margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-weight:600;display:flex;align-items:center;gap:8px}
.empty-state{background:var(--sf2);border:1px dashed var(--bd);border-radius:16px;padding:32px;text-align:center;color:var(--t2);font-size:13px;display:flex;flex-direction:column;align-items:center;gap:8px}
.empty-state svg{width:32px;height:32px;color:var(--t3)}
.ir{padding:10px 14px;margin-bottom:4px;display:flex;align-items:center;gap:8px;animation:slideIn .2s ease both;border-left:2px solid transparent;transition:all .12s;flex-wrap:wrap}
.ir:hover{border-left-color:var(--ac);background:var(--acd)}
.ir.checked{opacity:.45}
.ir-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--bd);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;padding:0}
.ir-check:hover{border-color:var(--em)}
.ir-check.on{background:var(--em);border-color:var(--em);color:#fff}
.ir-check svg{width:14px;height:14px}
.ir-star{font-size:13px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;color:var(--t3)}.ir-star.on{color:var(--ylw)}
.ir-star svg{width:16px;height:16px}
.ir-i{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);min-width:20px;font-weight:600;flex-shrink:0}
.ir-n{font-size:13px;font-weight:600;color:var(--t1);flex:1;cursor:pointer;display:flex;align-items:center;gap:6px}

function renderS(){const q=S.sq?.toLowerCase(),c=document.getElementById("sR");if(!c||!q){if(c)c.innerHTML="";return}const r=[];S.bins.forEach(bin=>{const matches=[];if(bin.label.toLowerCase().includes(q)||bin.id.toLowerCase().includes(q))matches.push({name:bin.label,type:'bin'});bin.items.forEach((it,idx)=>{const n=normItem(it);if(gn(it).toLowerCase().includes(q))matches.push({name:gn(it),type:'item',imp:isImp(it)});if(n.children)n.children.forEach(ch=>{const sc=normSub(ch);if(sc.name.toLowerCase().includes(q))matches.push({name:sc.name,type:'sub',parent:gn(it),checked:sc.checked})})});if(matches.length)r.push({bin,matches})});if(!r.length){c.innerHTML=`<div class="empty-state"><i data-lucide="search-x" style="width:32px;height:32px;color:var(--t3)"></i><span>No matches found</span></div>`;L.createIcons({nameAttr:'data-lucide'});return}let h="";r.forEach(({bin,matches})=>{const bcc=bc(bin);h+=`<div class="card card-sm sr" style="border-left-color:${bcc}" onclick="selBin('${bin.id}');S.view='bins';R()"><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><div style="width:32px;height:32px;border-radius:10px;background:${bcc}15;border:1px solid ${bcc}25;display:flex;align-items:center;justify-content:center;font-size:16px">${bin.icon}</div><div><div style="font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:700;color:${bcc}">${bin.id}</div><div style="font-size:13px;font-weight:700">${bin.label}</div></div></div>${matches.map(m=>m.type==='bin'?`<div class="sm"><i data-lucide="package" style="width:12px;height:12px"></i> Bin match</div>`:m.type==='sub'?`<div class="sm" style="margin-left:12px"><i data-lucide="${m.checked?'check-circle':'corner-down-right'}" style="width:12px;height:12px"></i> ${m.checked?'<s style="opacity:.45">':''}${m.name}${m.checked?'</s>':''} <span style="opacity:.6;font-size:9px">in ${m.parent}</span></div>`:`<div class="sm">${m.imp?'<i data-lucide="star" style="width:12px;height:12px;color:var(--ylw)"></i> ':''}$ function filterAI(q){const c=document.getElementById("aiR");if(!c)return;let all=allItems().filter(i=>!i.isChild);if(S.itemsFilter==="checked")all=all.filter(i=>i.checked);else if(S.itemsFilter==="unchecked")all=all.filter(i=>!i.checked);else if(S.itemsFilter==="important")all=all.filter(i=>i.imp);if(q)all=all.filter(i=>i.name.toLowerCase().includes(q.toLowerCase()));let h="";all.forEach(it=>{const n=normItem(it);const childCount=n.children?n.children.length:0;h+=`<div class="card card-sm ai" onclick="selBin('${it.binId}');S.view='bins';R()"><span class="ai-star">${it.imp?'<i data-lucide="star" style="width:14px;height:14px"></i>':''}</span><span class="ai-n">${it.checked?'<s style="opacity:.5">':''}${it.name}${it.checked?'</s>':''}${childCount?` <span style="font-size:10px;color:var(--ac);font-weight:700">(${childCount})</span>`:''}</span><span class="ai-b">${it.binId}</span><span class="ai-z">${it.zone}</span></div>`;if(childCount){n.children.forEach(ch=>{const sc=normSub(ch);h+=`<div class="ai-sub"><i data-lucide="${sc.checked?'check-circle':'corner-down-right'}" style="width:10px;height:10px;color:var(--ac)"></i> ${sc.checked?'<s style="opacity:.45">':''}${sc.name}${sc.checked?'</s>':''}</div>`})}});if(!all.length)h=`<div class="no">No matches</div>`;c.innerHTML=h;L.createIcons({nameAttr:'data-lucide'})}
